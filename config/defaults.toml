schema_version = 1
managed_by = "stronk-pi"

[runtime]
state_root = "~/.stronk-pi"
agent_dir = "~/.stronk-pi/agent"
session_base = "~/.stronk-pi/agent/sessions"
config_root = "~/.stronk-pi/config"
cache_root = "~/.stronk-pi/cache"
log_root = "~/.stronk-pi/logs"
tmp_root = "~/.stronk-pi/tmp"
generated_mcp_file = ".mcp.json"
web_search_config = "~/.stronk-pi/config/pi/web-search.json"
intercom_bridge = "~/.stronk-pi/agent/extensions/pi-intercom"

[harness]
subagent_facade = "stronk"
subagent_adapter = "intercom"
search_provider = "exa"

[models]
default = "kimi-coding/kimi-for-coding:xhigh"
vision = "kimi-coding/kimi-for-coding:xhigh"

[image_preflight]
enabled = true
model = "kimi-coding/kimi-for-coding:xhigh"
max_images = 12
max_bytes = 5242880
timeout_ms = 360000
stream_idle_timeout_ms = 60000
max_output_tokens = 4096
failure_mode = "soft"

[roles]
manifest = "~/.stronk-pi/config/roles.toml"
local_manifest = "~/.stronk-pi/config/roles.local.toml"
templates_dir = "~/.stronk-pi/config/role-templates"
generated_agents_dir = "~/.stronk-pi/agent/agents"

[package_pins]
mcp_adapter = { name = "pi-mcp-adapter", version = "2.9.0" }
subagents = { name = "pi-subagents", version = "0.22.0" }
intercom = { name = "pi-intercom", version = "0.6.0" }
jiti = { name = "jiti", version = "2.7.0" }
ask_user = { name = "pi-ask-user", version = "0.8.0" }
tsx = { name = "tsx", version = "4.22.4" }
typebox = { name = "typebox", version = "1.1.39" }
esbuild = { name = "esbuild", version = "0.28.0" }
