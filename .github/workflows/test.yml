name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offline:
    name: Test / Offline
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Offline suite
        run: STRONKPI_NO_NETWORK=1 sh tests/run_offline.sh

  guardrails:
    name: Security / Guardrails
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Guard matrix
        run: STRONKPI_NO_NETWORK=1 python3 -m unittest tests/test_guard_matrix.py

  manifest:
    name: Security / Manifest Verification
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Manifest suite
        run: STRONKPI_NO_NETWORK=1 python3 -m unittest tests/test_manifest_verifier.py

  installer:
    name: Security / Installer Dry Run
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Installer dry run
        run: STRONKPI_NO_NETWORK=1 sh tests/test_install_dry_run.sh

  os-macos:
    name: Compatibility / OS Matrix (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Offline suite
        run: STRONKPI_NO_NETWORK=1 sh tests/run_offline.sh

  os-ubuntu:
    name: Compatibility / OS Matrix (Ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Offline suite
        run: STRONKPI_NO_NETWORK=1 sh tests/run_offline.sh

  wsl-manual:
    name: Compatibility / WSL Manual Gate
    runs-on: ubuntu-24.04
    steps:
      - name: Manual gate
        run: 'printf "%s\n" "Record WSL evidence before public release."'
