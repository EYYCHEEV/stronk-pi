schema_version = 1
config_schema_version = 1
source_of_truth = "stronk-pi-public-role-templates"
managed_by = "stronk-pi"

[paths]
codex_roles_dir = "~/.stronk-pi/config/role-templates"
pi_agents_dir = "~/.stronk-pi/agent/agents"

[pi]
mode = "portable-runtime"
enabled_roles = "all-public-stronk"
read_tools = ["read", "grep", "find", "ls"]
write_tools = ["read", "grep", "find", "ls", "bash", "write", "edit"]
extensions = ["~/.stronk-pi/artifacts/stronk-pi-plugin-0.1.0/package/src/index.mjs"]
write_roles = [
  "executor",
]
system_prompt_mode = "replace"
inherit_project_context = true
inherit_skills = false
default_context = "fresh"
vision_model = "kimi-coding/kimi-for-coding"

[pi.policy]
write_routing = "owned-task-only"
scratch_write = "guard-test-only"
context = "fresh"
deny_overrides = true
deny_background = true
deny_worktree = true
deny_chains = true
